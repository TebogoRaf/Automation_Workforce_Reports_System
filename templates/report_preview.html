<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Report Preview</title>
<style>
body { font-family: Arial, sans-serif; background: #f4f7f8; margin:0; padding:0; }
h1 { text-align:center; color:#007BFF; margin:20px 0; }
.card { background:white; border-radius:10px; box-shadow:0 8px 15px rgba(0,0,0,0.1); padding:20px; margin:20px auto; max-width:900px; transition: transform 0.2s, box-shadow 0.2s; }
.card:hover { transform: translateY(-5px); box-shadow:0 12px 20px rgba(0,0,0,0.2); }
.card h2 { margin-top:0; color:#007BFF; }
table { width:100%; border-collapse: collapse; margin-top:10px; }
th, td { padding:12px; text-align:center; }
th { background:#007BFF; color:white; }
tr:nth-child(even) { background:#f4f7f8; }
tr:hover { background:#e0f0ff; }
.total-row { font-weight:bold; background:#ffd966; }
img { max-width:100%; height:auto; margin-top:10px; border-radius:8px; }
.download-btn { text-align:center; margin:20px; }
.download-btn button { padding:10px 20px; background:#28a745; color:white; border:none; border-radius:6px; cursor:pointer; box-shadow:0 4px 6px rgba(0,0,0,0.2);}
.download-btn button:hover { background:#1e7e34; }
</style>
</head>
<body>

<h1>Report Preview</h1>

<div class="download-btn">
    <form action="/report/download/{{ report_id }}" method="get">
        <button type="submit">Download Excel Report</button>
    </form>
</div>

{% for sheet, rows in tables.items() %}
<div class="card">
    <h2>{{ sheet }}</h2>
    <table>
        <tr>
            {% for col in rows[0].keys() %}
            <th>{{ col }}</th>
            {% endfor %}
        </tr>
        {% for row in rows %}
        <tr>
            {% for val in row.values() %}
            <td>{{ val }}</td>
            {% endfor %}
        </tr>
        {% endfor %}
    </table>
    {% if charts[sheet] %}
    <img src="data:image/png;base64,{{ charts[sheet] }}" alt="{{ sheet }} chart">
    {% endif %}
</div>
{% endfor %}

<div class="download-btn">
    <form action="/supervisor" method="get">
        <button type="submit" style="background:#dc3545;">Back to Dashboard</button>
    </form>
</div>

</body>
</html>
