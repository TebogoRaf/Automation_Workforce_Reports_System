<!DOCTYPE html>
<html>
<head>
    <title>Forgot Password</title>
    <style>
        body { font-family: Arial; background: #f0f2f5; }
        .container { margin: 50px auto; width: 400px; padding: 20px; background: #fff; border-radius: 10px; box-shadow: 0 5px 15px rgba(0,0,0,0.3);}
        h1 { text-align: center; color: #333; }
        input[type=email], input[type=password], input[type=submit] { width: 100%; padding: 10px; margin: 10px 0; border-radius: 5px; border: 1px solid #ccc; }
        .error { color: red; }
        .success { color: green; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Forgot Password</h1>

        <!-- Step 1: Enter email -->
        {% if not step %}
        <form method="post">
            <input type="email" name="email" placeholder="Enter your email" required>
            <input type="submit" value="Generate Temporary Password">
        </form>
        {% endif %}

        <!-- Step 2: Show temporary password and allow new password -->
        {% if step == "set_new" %}
        <p>Your temporary password is: <strong>{{ temp_password }}</strong></p>
        <form method="post">
            <input type="hidden" name="email" value="{{ email }}">
            <input type="hidden" name="temp_password" value="{{ temp_password }}">
            <input type="password" name="new_password" placeholder="Enter new password" required>
            <input type="password" name="confirm_password" placeholder="Confirm new password" required>
            <input type="submit" value="Update Password">
        </form>
        {% endif %}

        {% if error %}
            <p class="error">{{ error }}</p>
        {% endif %}
        {% if success %}
            <p class="success">{{ success }}</p>
        {% endif %}
        <p><a href="{{ url_for('home') }}">Back to Login</a></p>
    </div>
</body>
</html>
